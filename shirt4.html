<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>队衫设计4</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="main-container">
<h1>队衫设计 4</h1>

<div class="section image-card">
    <img src="design4.jpg" style="width:300px;border-radius:10px;">
</div>

<div class="section description-card">
    <strong>设计说明：</strong><br>
    本款队服采用纯黑有领短袖Polo版型，搭配黑色纽扣，简约干练，适配日常与活动场景。左胸位置印制天津大学国旗护卫队队徽，红白配色与黑色衣身形成鲜明对比，既突出视觉焦点，又彰显护卫队的庄重与热血。整体设计兼顾实用性与仪式感，传递护卫国旗、忠于使命的精神内核。
</div>

<div class="section">
    <h2>留言区</h2>
    <div id="comments"></div>
</div>

<div class="section">
    <h3>提交修改意见</h3>
    <div class="input-group">
        <input type="text" id="name" placeholder="请输入真实姓名">
        <textarea id="message" placeholder="请输入修改意见"></textarea>
    </div>
    <button onclick="submitComment()">提交</button>
</div>

<div class="section" style="text-align:center;">
    <button class="back-btn" onclick="goBack()">← 返回</button>
</div>

<div id="voteResult"></div>
<div class="vote-section">
    <button class="vote-btn" onclick="vote(designName)">
        投票支持
    </button>
</div>

<script>
window.designName = "shirt4";
window.parentPage = "shirt.html";
</script>

<script src="script.js"></script>

</body>
</html>
