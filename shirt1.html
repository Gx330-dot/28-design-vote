<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>队衫设计1</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="main-container">
<h1>队衫设计 1</h1>

<div class="section image-card">
    <img src="design1.jpg" style="width:300px;border-radius:10px;">
</div>

<div class="section description-card">
    <strong>设计说明：</strong><br>
    	1.数字28：国护第28届队员<br>
	2.和平鸽：护卫国旗，守护和平。同时象征着自由，希望与积极向上的力量<br>
	3.国护队牌：体现国护的纪律性，增强集体认同感、归属感<br>
</div>

<div class="section">
    <h2>留言区</h2>
    <div id="comments"></div>
</div>

<div class="section">
    <h3>提交修改意见</h3>
    <div class="input-group">
        <input type="text" id="name" placeholder="请输入真实姓名">
        <textarea id="message" placeholder="请输入修改意见"></textarea>
    </div>
    <button onclick="submitComment()">提交</button>
</div>

<div class="section" style="text-align:center;">
    <button class="back-btn" onclick="goBack()">← 返回</button>
</div>

<div id="voteResult"></div>
<div class="vote-section">
    <button class="vote-btn" onclick="vote(designName)">
        投票支持
    </button>
</div>

<script>
window.designName = "shirt1";
window.parentPage = "shirt.html";
</script>

<script src="script.js"></script>

</body>
</html>
